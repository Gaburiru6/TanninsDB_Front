<div class="container">
  <header>
    <h1>TanninsDB</h1>
  </header>

  <div class="form-card">
    <h2>{{ editando ? 'Editar Artigo' : 'Novo Artigo' }}</h2>

    <div *ngIf="error" class="error">{{ error }}</div>

    <form (ngSubmit)="salvar()">
      <div class="form-grid">

        <div class="form-group full">
          <label>Título</label>
          <input [(ngModel)]="artigo.titulo" name="titulo" required />
        </div>

        <div class="form-group full">
          <label>Link (DOI)</label>
          <input [(ngModel)]="artigo.link" name="link" />
        </div>

        <div class="form-group">
          <label>Espécie</label>
          <input [(ngModel)]="artigo.especie" name="especie" required />
        </div>

        <div class="form-group">
          <label>Local</label>
          <input [(ngModel)]="artigo.local" name="local" />
        </div>

        <div class="form-group">
          <label>Parte da Planta</label>
          <input [(ngModel)]="artigo.partePlanta" name="partePlanta" />
        </div>

        <div class="form-group">
          <label>Estação</label>
          <input [(ngModel)]="artigo.estacao" name="estacao" />
        </div>

        <div class="form-group">
          <label>Metodologia</label>
          <input [(ngModel)]="artigo.metodologia" name="metodologia" />
        </div>

        <div class="form-group">
          <label>Tipo de Extração</label>
          <input [(ngModel)]="artigo.tipoExtracao" name="tipoExtracao" />
        </div>

        <div class="form-group">
          <label>Fenólicos Totais</label>
          <input [(ngModel)]="artigo.fenolicos" name="fenolicos" type="number" step="0.01" />
        </div>

        <div class="form-group">
          <label>Taninos Totais</label>
          <input [(ngModel)]="artigo.taninos" name="taninos" type="number" step="0.01" />
        </div>

        <div class="form-group">
          <label>Taninos Condensados</label>
          <input [(ngModel)]="artigo.tcondensados" name="tcondensados" type="number" step="0.01" />
        </div>

        <div class="form-group">
          <label>Taninos Hidrolisáveis</label>
          <input [(ngModel)]="artigo.thidrolisaveis" name="thidrolisaveis" type="number" step="0.01" />
        </div>

      </div>

      <div class="form-actions">
        <button type="button" (click)="cancelar()" class="btn-secondary">Cancelar</button>
        <button type="submit" [disabled]="loading" class="btn-primary">
          {{ loading ? 'Salvando...' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
